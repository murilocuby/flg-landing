name: enforce-https

# O certificado HTTPS do GitHub Pages provisiona de forma ASSÍNCRONA depois do
# DNS (pode levar de minutos a ~24h). Este workflow liga o "Enforce HTTPS"
# (redirect http→https) automaticamente assim que o cert existir — tenta a cada
# 15min e sai cedo quando já está ligado. Some a necessidade de fazer manual.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      pages: write
    steps:
      - name: Ligar Enforce HTTPS quando o cert estiver pronto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          if [ "$(gh api repos/$REPO/pages -q '.https_enforced' 2>/dev/null)" = "true" ]; then
            echo "HTTPS ja esta forcado — nada a fazer."
            exit 0
          fi
          if gh api repos/$REPO/pages -X PUT -F https_enforced=true 2>/tmp/err; then
            echo "OK: HTTPS enforced (cert pronto). Redirect http->https ligado."
          else
            echo "Cert ainda nao pronto:"; cat /tmp/err || true
          fi
